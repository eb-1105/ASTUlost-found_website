<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTU Lost & Found | Login</title>
    <link rel="icon" type="image/x-icon" href="/image/astu-logo.jpg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>ASTU Lost & Found System</h1>
         <p>Helping students recover lost belongings</p><br>
        <a href="dashboard.html" id="dashboard" style="color:#fff;  text-decoration: none; ">Dashboard</a>
    </header>

    <!-- Login Section -->
    <main>
        <section id="loginsection">
            <h2>Login</h2>

            <form>
                <div>
                    <label for="email">Email</label><br>
                    <input type="email" id="email" name="email" required>
                </div>
                <br>
                <div>
                    <label for="password">Password</label><br>
                    <input type="password" id="password" name="password" required>
                </div>
                <br>
                 <button type="submit">Login</button>
                  
            </form>
            <p>
                Don’t have an account?
                <a href="register.html">Register here</a><br>
            </p>
        </section>
    </main>
    <!-- Footer -->
    <footer>
        <p>&copy; 2026 ASTU Lost & Found System</p>
    </footer>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
